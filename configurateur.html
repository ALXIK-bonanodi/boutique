<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bona Nodi — Configurateur Poisson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Bebas+Neue&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --sand:#e8c97a;--fuchsia:#c4286e;--fuchsia-lt:#e0558a;
      --ink:#1a1510;--ink-lt:#2c2318;--ink-md:#221c13;
      --cream:#faf5e8;--silver:#9a9070;
      --border:rgba(232,201,122,0.14);--ok:#7ecf8a;
      --font-display:'Bebas Neue',sans-serif;
      --font-body:'Cormorant Garamond',serif;
      --font-mono:'DM Mono',monospace;
    }
    html{scroll-behavior:smooth}
    body{background:var(--ink);color:var(--cream);font-family:var(--font-body);font-size:17px;line-height:1.6;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.03;pointer-events:none;z-index:9999}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--fuchsia)}

    /* HERO */
    .page-hero{padding:2.5rem 2.5rem 1.5rem;border-bottom:1px solid var(--border)}
    .page-hero-inner{max-width:1200px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem}
    .subtitle{font-family:var(--font-mono);font-size:0.54rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--fuchsia-lt);display:block;margin-bottom:0.4rem}
    .page-hero h1{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,3rem);letter-spacing:0.08em;color:var(--sand);line-height:0.92;margin-top:0.4rem}
    .page-hero-desc{font-family:var(--font-mono);font-size:0.52rem;letter-spacing:0.08em;color:var(--silver);max-width:38ch;line-height:1.7}

    /* TOP BAR */
    .top-bar{border-bottom:1px solid var(--border);background:rgba(26,21,16,0.4)}
    .top-bar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .modeles-tabs{display:flex;overflow-x:auto}
    .modele-tab{font-family:var(--font-mono);font-size:0.54rem;letter-spacing:0.14em;text-transform:uppercase;padding:0.65rem 1.2rem;cursor:pointer;border:none;background:transparent;color:var(--silver);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.2s;white-space:nowrap}
    .modele-tab:hover{color:var(--cream)}
    .modele-tab.active{color:var(--sand);border-bottom-color:var(--fuchsia)}
    .mode-tabs{display:flex;border-left:1px solid var(--border)}
    .mode-tab{font-family:var(--font-mono);font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.65rem 1.1rem;cursor:pointer;border:none;background:transparent;color:var(--silver);transition:all 0.2s;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px}
    .mode-tab:hover{color:var(--cream)}
    .mode-tab.active{color:var(--sand);border-bottom-color:var(--fuchsia)}

    /* LAYOUT 3 COLONNES */
    .config-layout{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 280px 260px;gap:0;min-height:calc(100vh - 260px)}

    /* COL 1 — APERÇU */
    .preview-col{padding:2rem 1.5rem 2rem 2.5rem;display:flex;flex-direction:column;gap:1rem;border-right:1px solid var(--border)}
    .preview-label{font-family:var(--font-mono);font-size:0.48rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--silver)}

    /* CANVAS — fond uploadable, pas de contour visible */
    .fish-canvas{
      width:100%;max-width:520px;
      aspect-ratio:4/3;
      position:relative;
      background:#ffffff;
      overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .fish-canvas.has-bg{background:transparent}
    .fish-canvas svg{width:92%;height:92%}
    .fish-canvas .part-img-layer{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:contain;pointer-events:none;border:none;outline:none;
    }

    /* Indicateurs parties */
    .parts-row{display:flex;gap:0.4rem;flex-wrap:wrap}
    .part-pill{display:flex;align-items:center;gap:0.35rem;padding:0.28rem 0.65rem;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;clip-path:polygon(0 0,calc(100% - 4px) 0,100% 4px,100% 100%,4px 100%,0 calc(100% - 4px))}
    .part-pill:hover{border-color:var(--fuchsia)}
    .part-pill.active-part{border-color:var(--sand);background:rgba(232,201,122,0.07)}
    .part-pill.done-part{border-color:rgba(126,207,138,0.4)}
    .part-pill-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .part-pill-lbl{font-family:var(--font-mono);font-size:0.48rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver)}
    .part-pill-val{font-family:var(--font-mono);font-size:0.46rem;color:var(--cream)}

    /* COL 2 — PANNEAU SÉLECTION INLINE */
    .side-panel{border-right:1px solid var(--border);display:flex;flex-direction:column;background:rgba(26,21,16,0.3);overflow:hidden}
    .side-panel-header{padding:0.8rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
    .side-panel-title{font-family:var(--font-display);font-size:1.2rem;letter-spacing:0.12em;color:var(--sand)}
    .side-panel-sub{font-family:var(--font-mono);font-size:0.44rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);margin-top:0.2rem}
    .panel-nav{display:flex;gap:0;flex-wrap:wrap;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
    .panel-nav-btn{font-family:var(--font-mono);font-size:0.44rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.4rem 0.65rem;cursor:pointer;border:none;background:transparent;color:var(--silver);border-bottom:2px solid transparent;margin-bottom:-1px;transition:color 0.2s;white-space:nowrap}
    .panel-nav-btn:hover{color:var(--cream)}
    .panel-nav-btn.active{color:var(--sand);border-bottom-color:var(--fuchsia)}
    .panel-nav-btn.done{color:var(--ok)}
    .panel-body{flex:1;overflow-y:auto;padding:0.8rem}

    /* GRILLE VIGNETTES */
    .vignettes-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem}
    .vignette{display:flex;flex-direction:column;align-items:center;gap:0.3rem;padding:0.55rem 0.35rem;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px));background:rgba(232,201,122,0.02);position:relative}
    .vignette:hover{border-color:var(--fuchsia-lt);background:rgba(196,40,110,0.05)}
    .vignette.selected{border-color:var(--sand);background:rgba(232,201,122,0.08)}
    .vignette.multi-selected{border-color:var(--ok);background:rgba(126,207,138,0.07)}
    .vignette.out{opacity:0.3;cursor:not-allowed;pointer-events:none}
    .vignette-img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(0,0,0,0.08);flex-shrink:0}
    .vignette-swatch{width:52px;height:52px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,0.08)}
    .vignette-check{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--ok);border:1.5px solid var(--ink-md);display:flex;align-items:center;justify-content:center;font-size:0.42rem;color:var(--ink)}
    .vignette-check.multi{background:var(--sand);color:var(--ink)}
    .vignette-name{font-family:var(--font-mono);font-size:0.42rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--silver);text-align:center;line-height:1.3;transition:color 0.2s}
    .vignette.selected .vignette-name,.vignette.multi-selected .vignette-name{color:var(--cream)}
    .vignette-prix{font-family:var(--font-mono);font-size:0.4rem;color:var(--fuchsia-lt)}
    .vignette-out-lbl{font-family:var(--font-mono);font-size:0.38rem;letter-spacing:0.06em;color:var(--fuchsia-lt)}
    .panel-next-btn{margin:0.5rem 0.8rem;padding:0.5rem;background:transparent;border:1px solid var(--border);color:var(--silver);font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;text-align:center;flex-shrink:0}
    .panel-next-btn:hover{border-color:var(--sand);color:var(--sand)}
    .multi-hint{font-family:var(--font-mono);font-size:0.44rem;letter-spacing:0.08em;color:var(--fuchsia-lt);padding:0.4rem 0.8rem;border-bottom:1px solid var(--border);background:rgba(196,40,110,0.05);flex-shrink:0}

    /* PANNEAU BUNDLE */
    .bundle-body{flex:1;overflow-y:auto;padding:0.8rem;display:flex;flex-direction:column;gap:0.7rem}
    .bundle-section-title{font-family:var(--font-mono);font-size:0.46rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--silver);padding-bottom:0.35rem;border-bottom:1px solid var(--border);margin-bottom:0.4rem}
    .bundle-card{display:flex;align-items:center;gap:0.6rem;padding:0.6rem 0.7rem;border:1px solid var(--border);cursor:pointer;transition:all 0.2s;background:rgba(232,201,122,0.02)}
    .bundle-card:hover{border-color:var(--fuchsia-lt)}
    .bundle-card.selected{border-color:var(--sand);background:rgba(232,201,122,0.07)}
    .bundle-card-img{width:36px;height:36px;object-fit:cover;border-radius:50%;border:1px solid var(--border);flex-shrink:0;background:var(--ink-lt)}
    .bundle-card-name{font-family:var(--font-body);font-style:italic;font-size:0.85rem;color:var(--cream);flex:1;min-width:0}
    .bundle-card-price{font-family:var(--font-display);font-size:0.9rem;color:var(--fuchsia-lt);flex-shrink:0}
    .bundle-card-check{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;font-size:0.42rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
    .bundle-card.selected .bundle-card-check{background:var(--ok);border-color:var(--ok);color:var(--ink)}

    /* COL 3 — RÉCAP */
    .recap-col{padding:1.5rem 1.5rem 1.5rem 1.2rem;display:flex;flex-direction:column;gap:0.9rem}
    .recap-title{font-family:var(--font-display);font-size:1.1rem;letter-spacing:0.15em;color:var(--sand)}
    .recap-list{display:flex;flex-direction:column;gap:0.25rem}
    .recap-item{display:flex;align-items:flex-start;gap:0.45rem;padding:0.35rem 0;border-bottom:1px solid var(--border)}
    .recap-item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:0.25rem}
    .recap-item-label{font-family:var(--font-mono);font-size:0.46rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);flex-shrink:0;width:52px}
    .recap-item-val{font-family:var(--font-mono);font-size:0.48rem;color:var(--cream);flex:1;line-height:1.5}
    .recap-sep{height:1px;background:var(--border)}
    .recap-price-label{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--silver)}
    .recap-price-val{font-family:var(--font-display);font-size:1.8rem;color:var(--sand);line-height:1.1}
    .recap-price-detail{font-family:var(--font-mono);font-size:0.44rem;color:var(--silver);margin-top:0.2rem;line-height:1.5}
    .recap-delai{font-family:var(--font-mono);font-size:0.44rem;letter-spacing:0.06em;color:var(--silver);line-height:1.6}
    .btn-add{width:100%;padding:0.8rem;background:var(--fuchsia);color:var(--cream);border:none;cursor:pointer;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.16em;text-transform:uppercase;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));transition:background 0.2s}
    .btn-add:hover{background:var(--fuchsia-lt)}
    .btn-add:disabled{opacity:0.35;cursor:not-allowed}
    .btn-reset{width:100%;padding:0.55rem;background:transparent;border:1px solid var(--border);color:var(--silver);font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
    .btn-reset:hover{border-color:var(--fuchsia);color:var(--fuchsia-lt)}

    .spinner{width:28px;height:28px;border:1px solid rgba(0,0,0,0.1);border-top-color:var(--fuchsia);border-radius:50%;animation:spin 0.8s linear infinite;margin:3rem auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:0.65rem 1.4rem;font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--cream);background:var(--fuchsia);clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:500;white-space:nowrap}
    #toast.show{opacity:1}

    /* RESPONSIVE */
    @media(max-width:1000px){
      .config-layout{grid-template-columns:1fr 260px;grid-template-rows:auto auto}
      .recap-col{grid-column:1/-1;border-top:1px solid var(--border);flex-direction:row;flex-wrap:wrap;align-items:flex-start;gap:1rem;padding:1rem 1.5rem}
      .recap-list{flex:1;min-width:200px}
    }
    @media(max-width:700px){
      .config-layout{grid-template-columns:1fr;grid-template-rows:auto auto auto}
      .side-panel{border-right:none;border-top:1px solid var(--border);max-height:380px}
      .preview-col{padding:1rem 1rem 0.5rem}
      .page-hero,.top-bar-inner{padding-left:1rem;padding-right:1rem}
      .fish-canvas{max-width:100%;aspect-ratio:3/2}
      .vignettes-grid{grid-template-columns:repeat(3,1fr)}
      .recap-col{padding:1rem;flex-direction:column}
    }
  </style>
</head>
<body>
<script src="nav-footer.js"></script>

<div class="page-hero">
  <div class="page-hero-inner">
    <div>
      <span class="subtitle">✦ Personnalisation</span>
      <h1>CRÉER MON POISSON</h1>
    </div>
    <p class="page-hero-desc">Choisissez les couleurs de chaque partie. Fabriqué à la main sur commande.</p>
  </div>
</div>

<div class="top-bar">
  <div class="top-bar-inner">
    <div class="modeles-tabs" id="modeles-tabs">
      <div class="spinner" style="width:16px;height:16px;margin:0.7rem 0;border-color:rgba(0,0,0,0.1);border-top-color:var(--fuchsia)"></div>
    </div>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="couleurs" onclick="switchMode('couleurs',this)">🎨 Couleurs</button>
      <button class="mode-tab" data-mode="bundle" onclick="switchMode('bundle',this)">📦 Bundle</button>
    </div>
  </div>
</div>

<div id="config-loading" style="padding:4rem;text-align:center"><div class="spinner"></div></div>

<div id="config-layout" class="config-layout" style="display:none">

  <!-- COL 1 : APERÇU -->
  <div class="preview-col">
    <p class="preview-label">Aperçu — cliquez une partie pour la modifier</p>
    <div class="fish-canvas" id="fish-canvas"></div>
    <div class="parts-row" id="parts-row"></div>
  </div>

  <!-- COL 2 : PANNEAU -->
  <div class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <p class="side-panel-title" id="panel-title">COULEURS</p>
      <p class="side-panel-sub" id="panel-sub">Sélectionnez une partie</p>
    </div>
    <div id="panel-couleurs" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
      <div class="panel-nav" id="panel-nav"></div>
      <div id="multi-hint" class="multi-hint" style="display:none">✦ Sélection multiple possible</div>
      <div class="panel-body" id="panel-body">
        <div class="vignettes-grid" id="vignettes-grid"></div>
      </div>
      <button class="panel-next-btn" id="panel-next-btn" onclick="goNextPart()">Partie suivante →</button>
    </div>
    <div id="panel-bundle" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <!-- Navigation bundle style onglets couleurs -->
      <div class="panel-nav" id="bundle-nav" style="flex-shrink:0">
        <button class="panel-nav-btn active" data-bsec="bundle" onclick="switchBundleSec('bundle',this)">Bundle</button>
        <button class="panel-nav-btn" data-bsec="fermoir" onclick="switchBundleSec('fermoir',this)">Fermoir</button>
      </div>
      <div id="bundle-sub-bundle" class="panel-body" style="flex:1;overflow-y:auto"></div>
      <div id="bundle-sub-fermoir" class="panel-body" style="display:none;flex:1;overflow-y:auto"></div>
    </div>
  </div>

  <!-- COL 3 : RÉCAP -->
  <div class="recap-col">
    <p class="recap-title">MA SÉLECTION</p>
    <div class="recap-list" id="recap-list"></div>
    <div class="recap-sep"></div>
    <div>
      <p class="recap-price-label">Total</p>
      <p class="recap-price-val" id="recap-price">—</p>
      <p class="recap-price-detail" id="recap-price-detail"></p>
    </div>
    <p class="recap-delai">⏱ Sur commande · ~15 jours ouvrables</p>
    <button class="btn-add" id="btn-add" disabled onclick="addToCart()">+ Ajouter au panier</button>
    <button class="btn-reset" onclick="resetAll()">↺ Recommencer</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const SB_URL='https://twtstslwhvrhmjfcfvvu.supabase.co';
  const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dHN0c2x3aHZyaG1qZmNmdnZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ1MzcsImV4cCI6MjA5MDQ3MDUzN30.11Ejag3jxcBtx9unK33dnaCjSIJDu0FszLeyYw91zgE';

  /* ── ÉTAT ── */
  let modeles=[],currentModele=null,bijouBase=null;

  /* selection[partieId] = couleur (objet) pour parties simples
     selection['supplement'] = [couleur, ...] pour multi-sélection */

  const CMAP={'bleu 1':'#5b9bd5','bleu 2':'#a8d4f5','bleu 3':'#1a3a6e','rouge':'#c0392b','rose':'#e91e8c','rose clair':'#f4a7c3','vert':'#27ae60','vert clair':'#7dce9a','jaune':'#f1c40f','orange':'#e67e22','blanc':'#f5f5f5','noir':'#1a1a1a','gris':'#808080','argent':'#c0c0c0','violet':'#8e44ad','marron':'#795548','beige':'#e8d5b7','turquoise':'#40e0d0','corail':'#ff6b6b','lilas':'#d7b2e8','doré':'#d4a017','multicolore':'linear-gradient(135deg,#e74c3c,#f1c40f,#2ecc71,#3498db)'};
  function hex(nom){if(!nom)return'#aaa';const l=(nom||'').toLowerCase().trim();if(CMAP[l])return CMAP[l];for(const[k,v]of Object.entries(CMAP)){if(l.includes(k)||k.includes(l))return v;}let h=0;for(let i=0;i<l.length;i++)h=l.charCodeAt(i)+((h<<5)-h);return`hsl(${Math.abs(h)%360},55%,55%)`;}

  /* ── SVG POISSON ── */
  const SVG={
    vb:'0 0 420 280',
    paths:{
      ventre:'M 80 155 Q 140 165 220 168 Q 290 170 360 155 Q 350 175 310 188 Q 260 200 200 202 Q 140 202 100 185 Z',
      dos:'M 80 155 Q 100 125 150 110 Q 210 95 280 100 Q 330 105 360 125 Q 370 140 360 155 Q 290 140 220 138 Q 140 136 80 155 Z',
      queue:'M 80 155 Q 60 160 30 175 Q 15 183 10 195 Q 20 198 35 192 Q 55 183 75 178 Q 60 190 50 205 Q 45 215 55 215 Q 70 210 85 198 Q 88 175 80 155 Z'
    },
    fixed:[
      {cx:340,cy:132,r:11,fill:'rgba(200,200,200,0.9)',stroke:'rgba(100,100,100,0.3)',sw:1},
      {cx:340,cy:132,r:8,fill:'__yeux__'},
      {cx:341,cy:131,r:4,fill:'#1a1510'},
      {cx:344,cy:128,r:2,fill:'rgba(255,255,255,0.85)'},
      {cx:405,cy:155,r:6,fill:'none',stroke:'#aaa',sw:2}
    ],
    centres:{dos:[220,122],ventre:[220,183],queue:[48,188],yeux:[340,158],supplement:[200,140]}
  };

  /* ── INIT ── */
  async function init(){
    const [setsRes,imgsRes] = await Promise.all([
      sb.from('boutique_settings').select('value').eq('key','configurateur_modeles').single(),
      sb.from('boutique_settings').select('value').eq('key','perles_images').single()
    ]);
    modeles = setsRes.data?.value || [];
    perlesImages = imgsRes.data?.value || {};
    if(!modeles.length) modeles=[await buildDefault()];

    /* Bundles */
    const{data:bij}=await sb.from('bijoux').select('*').or('nom.ilike.%bundle%,nom.ilike.%kit%').order('nom');
    bundles=(bij||[]).filter(b=>!b.no_sell&&!b.draft);

    renderModeleTabs();
    await selectModele(0);
    document.getElementById('config-loading').style.display='none';
    document.getElementById('config-layout').style.display='grid';
    if(currentModele?.parties?.length) openPart(currentModele.parties[0].id);
  }

  async function buildDefault(){
    const{data:bij}=await sb.from('bijoux').select('*').ilike('nom','%sardine%').limit(1);
    bijouBase=bij?.[0]||null;
    /* Toutes les perles visibles */
    const{data:mats}=await sb.from('materiaux')
      .select('id,mc,sc,designation,variante,prix,qty')
      .or('sc.ilike.%rocaille%,sc.ilike.%perle%,designation.ilike.%rocaille%,designation.ilike.%perle%')
      .order('variante');
    const perles=(mats||[]).filter(m=>perlesImages[m.id]?.visible!==false)
      .map(m=>({mat_id:m.id,nom:m.variante||m.designation||m.sc,prix:parseFloat(m.prix||0),stock:m.qty||0}));

    /* Fermoirs pour supplément */
    const{data:ferm}=await sb.from('materiaux').select('id,mc,sc,designation,variante,prix,qty').or('sc.ilike.%fermoir%,designation.ilike.%fermoir%,variante.ilike.%fermoir%').order('variante');
    const fermoirs=(ferm||[]).map(m=>({mat_id:m.id,nom:m.variante||m.designation||m.sc,prix:parseFloat(m.prix||0),stock:m.qty||0,supplement_prix:parseFloat(m.prix||0)}));

    return{
      id:'sardine',nom:'Petit Poisson — Sardine',
      ref_bijou:bijouBase?.ref||'',prix_base:parseFloat(bijouBase?.pv||0),
      svg:'sardine',
      parties:[
        {id:'dos',        label:'Dos',        couleurs:perles,  multi:false},
        {id:'ventre',     label:'Ventre',     couleurs:perles,  multi:false},
        {id:'queue',      label:'Queue',      couleurs:perles,  multi:false},
        {id:'yeux',       label:'Yeux',       couleurs:perles,  multi:false},
        {id:'supplement', label:'Supplément', couleurs:fermoirs,multi:true, supplement_prix:0}
      ]
    };
  }

  function renderModeleTabs(){
    document.getElementById('modeles-tabs').innerHTML=modeles.map((m,i)=>
      `<button class="modele-tab ${i===0?'active':''}" onclick="selectModele(${i})">${m.nom}</button>`
    ).join('');
  }

  async function selectModele(idx){
    currentModele=modeles[idx];selection={};selection.supplement=[];activePartie=null;
    document.querySelectorAll('.modele-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
    if(!currentModele.parties[0]?.couleurs?.length) { currentModele=await buildDefault(); modeles[idx]=currentModele; }
    if(!bijouBase||bijouBase.ref!==currentModele.ref_bijou){
      const{data}=await sb.from('bijoux').select('*').eq('ref',currentModele.ref_bijou).single();
      bijouBase=data; if(data) currentModele.prix_base=parseFloat(data.pv||currentModele.prix_base||0);
    }
    /* Filtrer les couleurs de chaque partie selon :
       1. visibilité globale (perlesImages[mat_id].visible !== false)
       2. enabled_mats de la partie (si défini) */
    currentModele.parties.forEach(p => {
      const allCouleurs = p.couleurs || [];
      p.couleurs_filtered = allCouleurs.filter(c => {
        const globalVisible = perlesImages[c.mat_id]?.visible !== false;
        const partieEnabled = !p.enabled_mats || p.enabled_mats.includes(c.mat_id);
        return globalVisible && partieEnabled;
      });
    });
    renderSVG(); renderPartsRow(); renderRecap(); renderPanelNav();
    /* Appliquer le fond du modèle */
    const canvas = document.getElementById('fish-canvas');
    if (currentModele.bg_url) {
      canvas.style.backgroundImage = `url('${currentModele.bg_url}')`;
      canvas.style.backgroundSize = 'cover';
      canvas.style.backgroundPosition = 'center';
      canvas.classList.add('has-bg');
    } else {
      canvas.style.backgroundImage = '';
      canvas.style.backgroundSize = '';
      canvas.style.backgroundPosition = '';
      canvas.classList.remove('has-bg');
    }
  }

  /* ── MODES ── */
  function switchMode(mode,btn){
    currentMode=mode;
    document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-couleurs').style.display=mode==='couleurs'?'flex':'none';
    document.getElementById('panel-bundle').style.display=mode==='bundle'?'flex':'none';
    document.getElementById('panel-title').textContent=mode==='couleurs'?'COULEURS':'BUNDLE';
    document.getElementById('panel-sub').textContent=mode==='couleurs'?'Choisissez les couleurs':'Composez votre ensemble';
    if(mode==='bundle') renderBundlePanel();
  }

  /* ── PANNEAU COULEURS ── */
  function openPart(partieId){
    activePartie=partieId;
    const p=currentModele.parties.find(x=>x.id===partieId);
    if(!p)return;
    document.getElementById('panel-title').textContent=p.label.toUpperCase();
    document.getElementById('panel-sub').textContent=p.multi?'Sélection multiple':'Choisissez une couleur';
    document.getElementById('multi-hint').style.display=p.multi?'block':'none';
    renderPanelNav(); renderVignettes(p); renderPartsRow();
    /* Bouton suivant */
    const idx=currentModele.parties.findIndex(x=>x.id===partieId);
    const next=currentModele.parties[idx+1];
    const btn=document.getElementById('panel-next-btn');
    btn.textContent=next?('→ '+next.label):'✓ Terminé';
  }

  function renderPanelNav(){
    document.getElementById('panel-nav').innerHTML=(currentModele?.parties||[]).map(p=>{
      const hasSel=p.multi?(selection.supplement||[]).length>0:!!selection[p.id];
      return`<button class="panel-nav-btn ${p.id===activePartie?'active':''} ${hasSel&&p.id!==activePartie?'done':''}"
        onclick="openPart('${p.id}')">${p.label}${hasSel&&p.id!==activePartie?' ✓':''}</button>`;
    }).join('');
  }

  function renderVignettes(partie){
    const grid=document.getElementById('vignettes-grid');
    const couleurs=partie.couleurs_filtered||partie.couleurs||[];
    if(!couleurs.length){
      grid.innerHTML='<p style="font-family:var(--font-mono);font-size:0.5rem;color:var(--silver);grid-column:1/-1;padding:1.5rem 0;text-align:center;letter-spacing:0.1em">Aucune couleur — configurer dans l\'admin</p>';
      return;
    }
    grid.innerHTML=couleurs.map(c=>{
      const isSel=partie.multi
        ?(selection.supplement||[]).some(s=>s.mat_id===c.mat_id)
        :selection[partie.id]?.mat_id===c.mat_id;
      const outStock=c.stock<=0;
      const couleurHex=hex(c.nom);
      const swatchUrl=perlesImages[c.mat_id]?.swatch||null;
      const preview=swatchUrl
        ?`<img class="vignette-img" src="${swatchUrl}" alt="${c.nom}" loading="lazy">`
        :`<div class="vignette-swatch" style="background:${couleurHex}"></div>`;
      return`<div class="vignette ${isSel?(partie.multi?'multi-selected':'selected'):''} ${outStock?'out':''}"
          onclick="${outStock?'':'selectCouleur(\''+partie.id+'\','+JSON.stringify(c).replace(/"/g,'&quot;')+')'}"
          title="${c.nom}${outStock?' — Épuisé':''}">
          <div style="position:relative;display:flex;justify-content:center">
            ${preview}
            ${isSel?`<span class="vignette-check ${partie.multi?'multi':''}">✓</span>`:''}
          </div>
          <span class="vignette-name">${c.nom}</span>
          ${c.supplement_prix?`<span class="vignette-prix">+${fmtP(c.supplement_prix)}</span>`:''}
          ${outStock?'<span class="vignette-out-lbl">Épuisé</span>':''}
        </div>`;
    }).join('');
  }

  function selectCouleur(partieId,couleur){
    const partie=currentModele.parties.find(p=>p.id===partieId);
    if(!partie)return;
    if(partie.multi){
      /* Multi-sélection pour supplément */
      const arr=selection.supplement||[];
      const idx=arr.findIndex(s=>s.mat_id===couleur.mat_id);
      if(idx>=0) arr.splice(idx,1); /* désélectionner si déjà sélectionné */
      else arr.push(couleur);
      selection.supplement=arr;
    } else {
      selection[partieId]=couleur;
      /* Auto-avancer à la partie suivante */
      const idx=currentModele.parties.findIndex(p=>p.id===partieId);
      const next=currentModele.parties[idx+1];
      if(next) setTimeout(()=>openPart(next.id),300);
    }
    renderSVG(); renderPartsRow(); renderRecap(); renderPanelNav();
    const p=currentModele.parties.find(x=>x.id===partieId);
    if(p)renderVignettes(p);
  }

  function goNextPart(){
    const idx=currentModele.parties.findIndex(p=>p.id===activePartie);
    const next=currentModele.parties[idx+1];
    if(next)openPart(next.id);
  }

  /* ── SVG ── */
  function renderSVG(){
    const canvas=document.getElementById('fish-canvas');
    /* Mode images par partie */
    const getPartImg=(partieId)=>{
      const sel=selection[partieId];
      if(!sel)return null;
      return perlesImages[sel.mat_id]?.[partieId]||null;
    };
    const hasImgs=['dos','ventre','queue'].some(id=>getPartImg(id));

    if(hasImgs){
      const layers=['ventre','dos','queue'].map(id=>{
        const url=getPartImg(id);
        return url?`<img src="${url}" class="part-img-layer" alt="${id}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain">`:'';
      }).join('');
      const yeuxC=selection['yeux']?hex(selection['yeux'].nom):'#5b9bd5';
      const eyeSvg=`<svg viewBox="${SVG.vb}" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">
        <circle cx="340" cy="132" r="11" fill="rgba(200,200,200,0.9)" stroke="rgba(100,100,100,0.3)" stroke-width="1"/>
        <circle cx="340" cy="132" r="8" fill="${yeuxC}" style="transition:fill 0.3s"/>
        <circle cx="341" cy="131" r="4" fill="#1a1510"/>
        <circle cx="344" cy="128" r="2" fill="rgba(255,255,255,0.85)"/>
      </svg>`;
      /* Zones cliquables transparentes */
      const clickZones=`<svg viewBox="${SVG.vb}" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:0;width:100%;height:100%">
        ${currentModele.parties.map(p=>{const c=SVG.centres[p.id];if(!c)return'';return`<rect x="${c[0]-38}" y="${c[1]-20}" width="76" height="40" fill="transparent" style="cursor:pointer" onclick="openPart('${p.id}')"/>`;}).join('')}
      </svg>`;
      canvas.innerHTML=layers+eyeSvg+clickZones;
      return;
    }

    /* SVG aplats couleur sur fond blanc */
    let defs='',body='';
    const getCoul=(id)=>{const s=selection[id];return s?hex(s.nom):'rgba(200,200,200,0.3)';};
    ['ventre','dos','queue'].forEach(id=>{
      const path=SVG.paths[id];if(!path)return;
      const c=getCoul(id);
      if(c.startsWith('linear-gradient')){
        const gid='g_'+id;
        defs+=`<linearGradient id="${gid}" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e74c3c"/><stop offset="50%" stop-color="#f1c40f"/><stop offset="100%" stop-color="#2ecc71"/></linearGradient>`;
        body+=`<path d="${path}" fill="url(#${gid})" stroke="rgba(0,0,0,0.1)" stroke-width="0.8" style="transition:fill 0.3s"/>`;
      }else{
        body+=`<path d="${path}" fill="${c}" stroke="rgba(0,0,0,0.1)" stroke-width="0.8" style="transition:fill 0.3s"/>`;
      }
    });
    /* Œil */
    const yeuxC=selection['yeux']?hex(selection['yeux'].nom):'#5b9bd5';
    SVG.fixed.forEach(el=>{
      const f=el.fill==='__yeux__'?yeuxC:(el.fill||'none');
      const s=el.stroke?`stroke="${el.stroke}" stroke-width="${el.sw||1}"`:'';
      body+=`<circle cx="${el.cx}" cy="${el.cy}" r="${el.r}" fill="${f}" ${s} style="transition:fill 0.3s"/>`;
    });
    /* Supplément : si un supplément a une image, l'afficher à la place du cercle fermoir
       via un foreignObject SVG centré sur la zone fermoir */
    const suppItems=selection.supplement||[];
    const suppAvecImg=suppItems.find(s=>perlesImages[s.mat_id]?.swatch);
    if(suppAvecImg){
      const imgUrl=perlesImages[suppAvecImg.mat_id].swatch;
      body+=`<foreignObject x="390" y="142" width="28" height="28" style="overflow:visible">
        <img xmlns="http://www.w3.org/1999/xhtml" src="${imgUrl}"
          style="width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(0,0,0,0.15)"
          alt="${suppAvecImg.nom}"/>
      </foreignObject>`;
    }
    /* Zones cliquables + labels */
    currentModele.parties.forEach(p=>{
      const c=SVG.centres[p.id];if(!c)return;
      body+=`<rect x="${c[0]-38}" y="${c[1]-20}" width="76" height="40" fill="transparent" style="cursor:pointer" onclick="openPart('${p.id}')" title="${p.label}"/>`;
      const hasSel=p.multi?(selection.supplement||[]).length>0:!!selection[p.id];
      if(!hasSel && p.id!=='supplement')
        body+=`<text x="${c[0]}" y="${c[1]}" text-anchor="middle" dominant-baseline="middle" font-family="DM Mono" font-size="9" fill="rgba(100,100,100,0.5)" letter-spacing="1" style="pointer-events:none">${p.label.toUpperCase()}</text>`;
    });
    canvas.innerHTML=`<svg viewBox="${SVG.vb}" xmlns="http://www.w3.org/2000/svg">${defs?'<defs>'+defs+'</defs>':''}${body}</svg>`;
  }

  /* ── INDICATEURS PARTIES ── */
  function renderPartsRow(){
    document.getElementById('parts-row').innerHTML=(currentModele?.parties||[]).map(p=>{
      const hasSel=p.multi?(selection.supplement||[]).length>0:!!selection[p.id];
      const dot=!p.multi&&selection[p.id]?hex(selection[p.id].nom):'transparent';
      const count=p.multi?(selection.supplement||[]).length:0;
      return`<div class="part-pill ${p.id===activePartie?'active-part':''} ${hasSel?'done-part':''}" onclick="openPart('${p.id}')">
        <span class="part-pill-dot" style="background:${dot};border:${hasSel&&!p.multi?'none':'1px dashed var(--silver)'}"></span>
        <span class="part-pill-lbl">${p.label}</span>
        ${hasSel&&!p.multi?`<span class="part-pill-val">— ${selection[p.id].nom}</span>`:''}
        ${p.multi&&count>0?`<span class="part-pill-val">— ${count} choix</span>`:''}
      </div>`;
    }).join('');
  }

  /* ── RÉCAP & PRIX ── */
  function renderRecap(){
    const list=document.getElementById('recap-list');
    const priceEl=document.getElementById('recap-price');
    const detailEl=document.getElementById('recap-price-detail');
    const btn=document.getElementById('btn-add');

    if(currentMode==='couleurs'){
      const obligatoires=currentModele.parties.filter(p=>!p.multi);
      const allDone=obligatoires.every(p=>!!selection[p.id]);
      list.innerHTML=currentModele.parties.map(p=>{
        const hasSel=p.multi?(selection.supplement||[]).length>0:!!selection[p.id];
        const dot=!p.multi&&selection[p.id]?hex(selection[p.id].nom):'transparent';
        let valStr='—';
        if(!p.multi&&selection[p.id]) valStr=selection[p.id].nom;
        if(p.multi&&(selection.supplement||[]).length>0) valStr=(selection.supplement||[]).map(s=>s.nom).join(', ');
        return`<div class="recap-item">
          <span class="recap-item-dot" style="background:${dot};border:${hasSel&&!p.multi?'none':'1px dashed var(--border)'}"></span>
          <span class="recap-item-label">${p.label}</span>
          <span class="recap-item-val">${valStr}</span>
        </div>`;
      }).join('');

      if(allDone){
        /* PRIX = prix_base du bijou uniquement + supplément si applicable */
        const prixSupp=(selection.supplement||[]).reduce((s,c)=>s+(c.supplement_prix||0),0);
        const total=currentModele.prix_base+prixSupp;
        priceEl.textContent=fmtP(total);
        detailEl.textContent=prixSupp>0?`Base ${fmtP(currentModele.prix_base)} + supplément ${fmtP(prixSupp)}`:'';
        btn.disabled=false;
      } else {
        const rem=obligatoires.filter(p=>!selection[p.id]).length;
        priceEl.textContent=`${rem} partie${rem>1?'s':''} restante${rem>1?'s':''}`;
        detailEl.textContent='';
        btn.disabled=true;
      }
    } else {
      /* Bundle */
      list.innerHTML=`
        <div class="recap-item"><span class="recap-item-dot" style="border:1px dashed var(--border)"></span><span class="recap-item-label">Bundle</span><span class="recap-item-val">${selectedBundle?selectedBundle.nom||selectedBundle.ref:'—'}</span></div>
        <div class="recap-item"><span class="recap-item-dot" style="border:1px dashed var(--border)"></span><span class="recap-item-label">Fermoir</span><span class="recap-item-val">${selectedFermoir?(selectedFermoir.variante||selectedFermoir.nom):'—'}</span></div>`;
      if(selectedBundle){
        const prixF=selectedFermoir?parseFloat(selectedFermoir.prix||0):0;
        priceEl.textContent=fmtP(parseFloat(selectedBundle.pv||0)+prixF);
        detailEl.textContent='';
        btn.disabled=false;
      } else { priceEl.textContent='—'; detailEl.textContent=''; btn.disabled=true; }
    }
  }

  /* ── BUNDLE ── */
  function switchBundleSec(sec, btn){
    document.querySelectorAll('#bundle-nav .panel-nav-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.bsec===sec);
    });
    document.getElementById('bundle-sub-bundle').style.display = sec==='bundle'?'block':'none';
    document.getElementById('bundle-sub-fermoir').style.display = sec==='fermoir'?'block':'none';
  }

  async function renderBundlePanel(){
    /* Spinner dans les deux sections */
    document.getElementById('bundle-sub-bundle').innerHTML = '<div class="spinner"></div>';
    document.getElementById('bundle-sub-fermoir').innerHTML = '<div class="spinner"></div>';

    const{data:fermoirs}=await sb.from('materiaux')
      .select('id,mc,sc,designation,variante,prix,qty')
      .or('sc.ilike.%fermoir%,designation.ilike.%fermoir%,variante.ilike.%fermoir%')
      .order('variante');
    const fl=fermoirs||[];

    /* ── SECTION BUNDLE ── */
    let htmlB='';
    if(bundles.length){
      bundles.forEach(function(b,i){
        const isSel=selectedBundle&&selectedBundle.id===b.id;
        const desc=b.description||b.variante||'';
        htmlB+='<div class="vignette '+(isSel?'selected':'')+'" onclick="selectBundle('+i+')" style="flex-direction:row;align-items:flex-start;gap:0.6rem;padding:0.6rem;height:auto;clip-path:none;margin-bottom:0.4rem">';
        htmlB+=(b.photo?'<img src="'+b.photo+'" style="width:44px;height:44px;object-fit:cover;border-radius:4px;flex-shrink:0">':'<div style="width:44px;height:44px;background:var(--ink-lt);border:1px solid var(--border);border-radius:4px;flex-shrink:0"></div>');
        htmlB+='<div style="flex:1;min-width:0">';
        htmlB+='<p style="font-family:var(--font-body);font-style:italic;font-size:0.88rem;color:var(--cream);margin-bottom:0.15rem">'+(b.nom||b.ref)+'</p>';
        if(desc) htmlB+='<p style="font-family:var(--font-mono);font-size:0.42rem;color:var(--silver);line-height:1.4;margin-bottom:0.2rem">'+desc+'</p>';
        htmlB+='<div style="display:flex;gap:0.25rem;flex-wrap:wrap">';
        ['Poisson personnalisé','Petite arête','Fermoir'].forEach(function(item){
          htmlB+='<span style="font-family:var(--font-mono);font-size:0.38rem;padding:0.1rem 0.35rem;border:1px solid var(--border);color:var(--silver)">'+item+'</span>';
        });
        htmlB+='</div></div>';
        htmlB+='<div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.3rem;flex-shrink:0">';
        htmlB+='<span style="font-family:var(--font-display);font-size:1rem;color:var(--fuchsia-lt)">'+(b.pv?fmtP(b.pv):'')+'</span>';
        htmlB+='<span class="vignette-check" style="position:static;'+(isSel?'':'display:none')+'">✓</span>';
        htmlB+='</div>';
        htmlB+='</div>';
      });
    } else {
      htmlB='<p style="font-family:var(--font-mono);font-size:0.5rem;color:var(--silver);padding:1rem 0;text-align:center">Aucun bundle disponible.</p>';
    }
    document.getElementById('bundle-sub-bundle').innerHTML=htmlB;

    /* ── SECTION FERMOIR ── */
    let htmlF='';
    if(fl.length){
      htmlF='<div class="vignettes-grid">';
      fl.forEach(function(f,i){
        const isSel=selectedFermoir&&selectedFermoir.id===f.id;
        const swImg=perlesImages[f.id]&&perlesImages[f.id].swatch;
        const couleurHex=hex(f.variante||f.sc||'');
        const preview=swImg
          ?'<img class="vignette-img" src="'+swImg+'" alt="'+f.variante+'" loading="lazy">'
          :'<div class="vignette-swatch" style="background:'+couleurHex+'"></div>';
        htmlF+='<div class="vignette '+(isSel?'selected':'')+'" onclick="selectFermoirItem('+i+')" data-fi="'+i+'">';
        htmlF+='<div style="position:relative;display:flex;justify-content:center">';
        htmlF+=preview;
        if(isSel) htmlF+='<span class="vignette-check">✓</span>';
        htmlF+='</div>';
        htmlF+='<span class="vignette-name">'+(f.variante||f.designation||f.sc)+'</span>';
        htmlF+='<span class="vignette-prix">'+(f.prix?'+'+fmtP(f.prix):'inclus')+'</span>';
        htmlF+='</div>';
      });
      htmlF+='</div>';
    } else {
      htmlF='<p style="font-family:var(--font-mono);font-size:0.5rem;color:var(--silver);padding:1rem 0;text-align:center">Aucun fermoir trouvé.</p>';
    }
    document.getElementById('bundle-sub-fermoir').innerHTML=htmlF;
    document.getElementById('bundle-sub-fermoir')._fermoirs=fl;
  }


  function selectBundle(idx){selectedBundle=bundles[idx];renderBundlePanel();renderRecap();}
  function selectFermoirItem(idx){
    const fl=document.getElementById('bundle-sub-fermoir')._fermoirs||[];
    selectedFermoir=fl[idx];renderBundlePanel();renderRecap();
  }

  /* ── PANIER ── */
  function addToCart(){
    let cart=[];try{cart=JSON.parse(localStorage.getItem('bn_cart')||'[]');}catch(e){}
    if(currentMode==='couleurs'){
      const prixSupp=(selection.supplement||[]).reduce((s,c)=>s+(c.supplement_prix||0),0);
      const total=currentModele.prix_base+prixSupp;
      const parts=currentModele.parties.filter(p=>!p.multi).map(p=>`${p.label}: ${selection[p.id]?.nom}`);
      const supps=(selection.supplement||[]).map(s=>s.nom);
      if(supps.length) parts.push('Supplément: '+supps.join(', '));
      const desc=parts.join(' · ');
      cart.push({ref:currentModele.ref_bijou+'_CUSTOM_'+Date.now(),name:currentModele.nom+' personnalisé',prix:total,photo:null,variante:desc,qty:1,sur_commande:true});
    } else {
      const prixF=selectedFermoir?parseFloat(selectedFermoir.prix||0):0;
      cart.push({ref:selectedBundle.ref+'_BUNDLE_'+Date.now(),name:'Bundle '+(selectedBundle.nom||selectedBundle.ref),prix:parseFloat(selectedBundle.pv||0)+prixF,photo:null,variante:(selectedFermoir?'Fermoir: '+(selectedFermoir.variante||selectedFermoir.nom):''),qty:1,sur_commande:true});
    }
    localStorage.setItem('bn_cart',JSON.stringify(cart));
    toast('Ajouté au panier ✦');
    setTimeout(()=>{window.location.href='checkout.html';},1500);
  }

  function resetAll(){selection={};selection.supplement=[];selectedBundle=null;selectedFermoir=null;activePartie=null;renderSVG();renderPartsRow();renderRecap();renderPanelNav();if(currentMode==='bundle')renderBundlePanel();}

  init();
</script>
</body>
</html>
