<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bona Nodi — Entretien des bijoux</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Bebas+Neue&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--sand:#e8c97a;--fuchsia:#c4286e;--fuchsia-lt:#e0558a;--ink:#1a1510;--cream:#faf5e8;--silver:#9a9070;--border:rgba(232,201,122,0.14)}
    html{scroll-behavior:smooth}
    body{background:var(--ink);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:18px;line-height:1.7;min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:0.03;pointer-events:none;z-index:9999}
    ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--fuchsia)}
    .page-hero{padding:4rem 2.5rem 2.5rem;border-bottom:1px solid var(--border);max-width:900px;margin:0 auto}
    .page-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,6vw,5rem);letter-spacing:0.1em;color:var(--sand);line-height:0.9;margin-bottom:1rem}
    .page-hero .subtitle{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--fuchsia-lt)}
    .page-content{max-width:760px;margin:0 auto;padding:3rem 2.5rem 6rem}
    .page-section{margin-bottom:2.5rem}
    .page-section h2{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:0.12em;color:var(--sand);margin-bottom:0.8rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)}
    .page-section p{font-size:1rem;color:rgba(250,245,232,0.85);line-height:1.85;margin-bottom:0.8rem;max-width:65ch}
    .tip-box{padding:1rem 1.2rem;border:1px solid rgba(232,201,122,0.25);background:rgba(232,201,122,0.04);margin:1rem 0}
    .tip-box p{margin-bottom:0}
    .page-section em{color:var(--fuchsia-lt)}
    .spinner{width:32px;height:32px;border:1px solid var(--border);border-top-color:var(--fuchsia);border-radius:50%;animation:spin 0.8s linear infinite;margin:4rem auto;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:700px){.page-hero,.page-content{padding-left:1.2rem;padding-right:1.2rem}}
  </style>
</head>
<body>
<script src="nav-footer.js"></script>

<div class="page-hero">
  <p class="subtitle">✦ Prendre soin de vos bijoux</p>
  <h1>ENTRETIEN</h1>
</div>

<div class="page-content" id="page-content">
  <div class="spinner"></div>
</div>

<script>
  const SB_URL = 'https://twtstslwhvrhmjfcfvvu.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3dHN0c2x3aHZyaG1qZmNmdnZ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTQ1MzcsImV4cCI6MjA5MDQ3MDUzN30.11Ejag3jxcBtx9unK33dnaCjSIJDu0FszLeyYw91zgE';

  const DEFAULT_SECTIONS = [
    { title: 'Conseils généraux', text: 'Vos bijoux Bona Nodi sont fabriqués avec soin pour durer. Quelques gestes simples permettent de les conserver longtemps.\n\n— Retirez vos bijoux avant de vous laver, nager ou faire du sport\n— Évitez le contact avec les parfums, crèmes et produits chimiques\n— Rangez-les séparément pour éviter les frottements' },
    { title: 'Chainmail — acier inoxydable', text: 'L\'acier inoxydable est très résistant et ne s\'oxyde pas. Essuyez-le avec un chiffon doux si nécessaire. Pas de traitement particulier requis.' },
    { title: 'Chainmail — laiton & cuivre', text: 'Ces métaux peuvent foncer avec le temps — c\'est naturel. Pour retrouver leur éclat, frottez doucement avec un chiffon légèrement humide.\n\nAstuce : un peu de dentifrice sur un chiffon doux, suivi d\'un rinçage à l\'eau claire, redonne vie aux maillons en laiton.' },
    { title: 'Bijoux Poisson Perles', text: 'Les perles sont délicates. Évitez l\'eau et l\'humidité prolongée. Essuyez-les après chaque port avec un chiffon doux et sec.\n\n— Ne pas tremper dans l\'eau\n— Éviter l\'exposition prolongée au soleil\n— Ranger dans la pochette fournie' },
    { title: 'Stockage', text: 'Conservez vos bijoux dans un endroit sec, à l\'abri de la lumière directe. Un sachet anti-humidité dans votre boîte à bijoux peut aider.' },
    { title: 'SAV & Réparations', text: 'Un maillon abîmé, une perle détachée ? Notre SAV prend en charge les défauts de fabrication dans les 6 mois. Contactez-nous à contact@bonanodi.fr avec votre numéro de commande et des photos.' }
  ];

  function renderSections(sections) {
    const el = document.getElementById('page-content');
    el.innerHTML = sections.map(s => `
      <div class="page-section">
        <h2>${s.title || ''}</h2>
        ${(s.text || '').split('\n').filter(l => l.trim()).map(l =>
          l.startsWith('—') ? `<p style="padding-left:1rem;border-left:1px solid var(--border)">${l}</p>`
          : l.toLowerCase().includes('astuce') ? `<div class="tip-box"><p><em>${l}</em></p></div>`
          : `<p>${l}</p>`
        ).join('')}
      </div>`).join('');
  }

  async function loadContent() {
    try {
      const { createClient } = window.supabase;
      const sb = createClient(SB_URL, SB_KEY);
      const { data } = await sb.from('boutique_settings').select('value').eq('key', 'page_entretien').single();
      const sections = data?.value?.sections;
      renderSections(sections?.length ? sections : DEFAULT_SECTIONS);
    } catch {
      renderSections(DEFAULT_SECTIONS);
    }
  }
  loadContent();
</script>
</body>
</html>
